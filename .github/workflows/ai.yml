name: Download HuggingFace Model Snapshot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  download_hf_model:
    runs-on: ubuntu-latest

    env:
      HF_MODEL_ID: mlx-community/Qwen3-TTS-12Hz-1.7B-VoiceDesign-8bit
      LOCAL_DIR: Qwen3-TTS-12Hz-1.7B-VoiceDesign-8bit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Hugging Face Hub
        run: |
          pip install huggingface_hub

      - name: Download Model Repository
        run: |
          echo "Starting download for model: ${{ env.HF_MODEL_ID }}"
          hf download ${{ env.HF_MODEL_ID }} --local-dir ${{ env.LOCAL_DIR }}
          echo "Download complete."
          ls -lh ${{ env.LOCAL_DIR }}/

      - name: Compress Downloaded Models
        run: |
          tar -cf models_snapshot_${{ env.LOCAL_DIR }}.tar ${{ env.LOCAL_DIR }}

      - name: Upload Model Snapshot
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.LOCAL_DIR }}-snapshot
          path: models_snapshot_${{ env.LOCAL_DIR }}.tar
          compression-level: 0
