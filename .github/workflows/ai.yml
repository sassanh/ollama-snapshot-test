name: Download Test Item

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  download_bundle:
    runs-on: ubuntu-latest

    env:
      DOWNLOAD_URL: https://installers.lmstudio.ai/darwin/arm64/0.4.12-1/LM-Studio-0.4.12-1-arm64.dmg

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download
        run: |
          echo "Starting download"
          curl -L -o file ${{ env.DOWNLOAD_URL }}
          echo "Download complete."

      - name: Compress Installer
        run: |
          tar -cf bundle.tar file

      - name: Upload Installer Snapshot
        uses: actions/upload-artifact@v6
        with:
          name: bundle
          path: bundle.tar
          compression-level: 0
