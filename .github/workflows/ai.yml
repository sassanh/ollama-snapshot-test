name: Download HuggingFace Model Snapshot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  download_hf_model:
    runs-on: ubuntu-latest

    env:
      HF_MODEL_ID: unsloth/gemma-4-E4B-it-UD-MLX-4bit
      MODEL_NAME: gemma4_31b

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Hugging Face Hub
        run: |
          pip install huggingface_hub

      - name: Download Model Repository
        run: |
          echo "Starting download for model: ${{ env.HF_MODEL_ID }}"
          hf download ${{ env.HF_MODEL_ID }} --local-dir ${{ env.MODEL_NAME }} --local-dir-use-symlinks False
          echo "Download complete."
          ls -lh ${{ env.MODEL_NAME }}/

      - name: Compress Downloaded Models
        run: |
          tar -cf models_snapshot_${{ env.MODEL_NAME }}.tar ${{ env.MODEL_NAME }}

      - name: Upload Model Snapshot
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MODEL_NAME }}-snapshot
          path: models_snapshot_${{ env.MODEL_NAME }}.tar
          compression_level: 0
